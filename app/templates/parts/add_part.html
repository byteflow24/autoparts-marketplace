{% extends "base.html" %}

{% block title %}Add Part | AutoParts Marketplace{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card auth-card-wide">
            <div class="auth-header">
                <h1>Add Part to Inventory</h1>
                <p>Create a part and link it to your garage inventory.</p>
            </div>

            <form method="POST" class="auth-form">
                <h2 class="form-section-title">Part Information</h2>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Part Name</label>
                        <input type="text" name="name" class="form-input" placeholder="Example: Brake Pad" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Part Number</label>
                        <input type="text" name="part_number" class="form-input" placeholder="Optional part number">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Brand</label>
                        <input type="text" name="brand" class="form-input" placeholder="Example: Bosch">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <input type="text" name="category" class="form-input" placeholder="Example: Brakes">
                    </div>
                </div>

                <h2 class="form-section-title">Compatibility</h2>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Car Make</label>
                        <select name="car_make_id" class="form-input">
                            <option value="">Select make</option>
                            {% for make in car_makes %}
                                <option value="{{ make.id }}">{{ make.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Car Model</label>
                        <select name="car_model_id" class="form-input" required>
                            <option value="">Select model</option>
                            {% for model in car_models %}
                                <option value="{{ model.id }}">
                                    {{ model.make.name }} - {{ model.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">From Year</label>
                        <input type="number" name="from_year" class="form-input" placeholder="Example: 2018">
                    </div>

                    <div class="form-group">
                        <label class="form-label">To Year</label>
                        <input type="number" name="to_year" class="form-input" placeholder="Example: 2022">
                    </div>
                </div>

                <h2 class="form-section-title">Inventory Details</h2>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.01" name="price" class="form-input" placeholder="Example: 150.00" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Cost Price</label>
                        <input type="number" step="0.01" name="cost_price" class="form-input" placeholder="Optional (for profit tracking)">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-input" placeholder="Example: 5" required>
                    </div>
                </div>

                <div class="checkbox-grid">
                    <label class="checkbox-item">
                        <input type="checkbox" name="delivery_available">
                        <span>Delivery Available</span>
                    </label>

                    <label class="checkbox-item">
                        <input type="checkbox" name="installation_available">
                        <span>Installation Available</span>
                    </label>

                    <label class="checkbox-item">
                        <input type="checkbox" name="pickup_available">
                        <span>Pickup Available</span>
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary form-btn">Add Part</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
