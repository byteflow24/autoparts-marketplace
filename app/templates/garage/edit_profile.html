{% extends "base.html" %}

{% block title %}Edit Garage Profile | AutoParts Marketplace{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card auth-card-wide">
            <div class="auth-header">
                <h1>Edit Garage Profile</h1>
                <p>Update your garage information and business details.</p>
            </div>

            <form method="POST" class="auth-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Garage Name</label>
                        <input
                            type="text"
                            name="garage_name"
                            class="form-input"
                            value="{{ garage.garage_name or '' }}"
                            placeholder="Enter garage name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <input
                            type="text"
                            name="location"
                            class="form-input"
                            value="{{ garage.location or '' }}"
                            placeholder="Enter garage location"
                        >
                    </div>

                    <div class="form-group form-group-full">
                        <label class="form-label">National Address</label>
                        <input
                            type="text"
                            name="national_address"
                            class="form-input"
                            value="{{ garage.national_address or '' }}"
                            placeholder="Enter national address"
                        >
                    </div>

                    <div class="form-group form-group-full">
                        <label class="form-label">Specialization</label>
                        <input
                            type="text"
                            name="specialization"
                            class="form-input"
                            value="{{ garage.specialization or '' }}"
                            placeholder="Example: Engine, brakes, electrical parts"
                        >
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary form-btn">
                        Save Changes
                    </button>
                </div>
            </form>

            <div class="auth-footer-text">
                <p>
                    <a href="{{ url_for('garage.dashboard') }}">Back to Dashboard</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
